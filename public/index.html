<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kurageプロジェクト AIRadio Scripted-MV</title>
  <meta name="description" content="MP3から歌詞を抽出し、AIで脚本・画像を生成して、歌詞字幕付きミュージックビデオを作るKurageプロジェクトのAIRadio Scripted-MV。">
  <style>
    :root{--bg:#f4f9fb;--surface:#fff;--text:#132329;--muted:#5a6a72;--accent:#007f96;--accent2:#35b99b;--border:#dbe5e8}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8fcff 0%,#edf8fb 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
    header{background:rgba(255,255,255,.9);border-bottom:1px solid var(--border);padding:18px 22px}
    .brand{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:12px}
    .brand img{width:54px;height:54px;border-radius:50%;object-fit:cover;box-shadow:0 2px 10px rgba(0,127,150,.18)}
    .brand strong{display:block;font-size:20px;line-height:1.2}.brand span{color:var(--muted);font-size:13px}
    main{max-width:1040px;margin:0 auto;padding:48px 22px}
    .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:34px;align-items:center}
    h1{font-size:42px;line-height:1.18;margin:0 0 18px;letter-spacing:0;font-weight:900}
    p{font-size:16px;line-height:1.9;color:var(--muted);margin:0 0 20px}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:0 8px 28px rgba(19,35,41,.08)}
    .steps{display:grid;gap:12px;margin-top:18px}.step{padding:13px 14px;border:1px solid var(--border);border-radius:10px;background:#fbfeff;font-weight:800}.step span{color:var(--accent);margin-right:8px}
    .btn{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;text-decoration:none;border-radius:10px;padding:13px 20px;font-weight:900}.btn:hover{background:#006578}
    .note{font-size:13px;color:var(--muted);margin-top:12px}
    @media(max-width:760px){.hero{grid-template-columns:1fr}h1{font-size:31px}main{padding-top:30px}}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="assets/kurage-icon.png" alt="Kurage">
      <div>
        <strong>Kurageプロジェクト AIRadio Scripted-MV</strong>
        <span>AIショート動画生成から派生した、歌詞字幕付きミュージックビデオ生成システム</span>
      </div>
    </div>
  </header>
  <main>
    <section class="hero">
      <div>
        <h1>音楽ファイルから、歌詞字幕付きMVを生成する。</h1>
        <p>MP3をアップロードすると、歌詞抽出、映像脚本生成、画像生成、HyperFramesによる動画生成までを一連のパイプラインで実行します。</p>
        <a class="btn" href="scripted-mv.php">生成ツールを開く</a>
        <div class="note">管理者ログイン後に利用できます。</div>
      </div>
      <div class="panel">
        <div class="steps">
          <div class="step"><span>1</span>MP3アップロード</div>
          <div class="step"><span>2</span>Demucs + Whisperで歌詞抽出</div>
          <div class="step"><span>3</span>歌詞から12シーンの映像脚本生成</div>
          <div class="step"><span>4</span>画像12枚生成</div>
          <div class="step"><span>5</span>HyperFramesで字幕付きMV生成</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
