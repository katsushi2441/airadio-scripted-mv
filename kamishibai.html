        font-size: 12px !important;

</div>
<textarea id="scriptArea" placeholder="ここに元ネタ原稿を書く..."></textarea>
<button onclick="generateStory()">シナリオ生成</button>
<div id="editor">
    <div class="slideBox">
        <input type="file" accept="image/*" onchange="previewThumb(this,0)">
        <img id="thumb0">
        <textarea id="text0" placeholder="セリフ1"></textarea>
    </div>
    <div class="slideBox">
        <input type="file" accept="image/*" onchange="previewThumb(this,1)">
        <img id="thumb1">
        <textarea id="text1" placeholder="セリフ2"></textarea>
    </div>
    <div class="slideBox">
        <input type="file" accept="image/*" onchange="previewThumb(this,2)">
        <img id="thumb2">
        <textarea id="text2" placeholder="セリフ3"></textarea>
    </div>
    <div class="slideBox">
        <input type="file" accept="image/*" onchange="previewThumb(this,3)">
        <img id="thumb3">
        <textarea id="text3" placeholder="セリフ4"></textarea>
    </div>
    <div class="slideBox">
        <input type="file" accept="image/*" onchange="previewThumb(this,4)">
        <img id="thumb4">
        <textarea id="text4" placeholder="セリフ5"></textarea>
    </div>
</div>

<div style="width:92%;margin:20px auto;">
    <label style="display:block;margin-bottom:6px;">
        📝 プロジェクトタイトル

    <input type="text" id="projectTitle" placeholder="タイトルを入力..." style="width:60%;padding:8px;">
</div>

<div style="width:92%;margin:20px auto;">
    <label style="display:block;margin-bottom:6px;">
        🎵 BGM（mp3）
    </label>
    <input type="file" id="bgmFile" accept="audio/*">
    <div id="bgmStatus" style="margin-top:8px;color:#38bdf8;"></div>
    <label style="display:block;margin-top:12px;margin-bottom:6px;">
        ⏱ BGM開始秒
    </label>
    <input type="number" id="bgmStart" value="0" min="0" style="width:120px;">
</div>
<div style="display:flex;gap:16px;margin:10px 0 0 14%;">
    <button id="playBtn">再生</button>
    <button onclick="saveProject()">💾 保存</button>
</div>
<div id="preview">
    <video id="previewVideo" controls style="display:none;width:100%;max-width:640px;"></video>
    <img id="previewImage">
    <div id="caption"></div>
</div>
